<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escanea el QR — Bot WhatsApp</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 24px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.08); }
  h1 { font-size: 22px; margin-bottom: 14px; }
  p { line-height: 1.6; margin-bottom: 16px; }
  .qr-box { text-align: center; padding: 16px; border: 1px solid #ececec; border-radius: 14px; background: #fbfbfb; }
  .qr-box img { max-width: 100%; height: auto; }
  .note { background: #effdf4; color: #0f5132; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1e7dd; font-size: 14px; }
  a { color: #128C7E; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Escanea este QR con WhatsApp</h1>
  <p>Usa la cámara o la opción <strong>Dispositivos vinculados</strong> en WhatsApp para escanear el QR desde tu teléfono.</p>
  <div class="qr-box">
    <img src="/qr/whatsapp-qr.png" alt="QR WhatsApp" />
  </div>
  <div class="note">
    Si el QR no aparece, vuelve a iniciar el bot y espera a que el QR se genere de nuevo.
  </div>
  <p><a href="/">Volver al panel de control</a></p>
</div>
</body>
</html>
